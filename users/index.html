<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー管理 - 東京都立田柄高等学校資産管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .form-card { padding: 24px; margin-bottom: 24px; }
        .form-card h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .form-row {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
        }
        .form-group {
            display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px;
        }
        .form-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .form-group input,
        .form-group select {
            padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
        }
        .form-group input { color: var(--text); }
        .form-group select {
            color: #0F172A;
            background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
            padding-right: 30px;
        }
        .form-group select:valid { color: var(--text); }
        .form-group select:invalid { color: var(--text-secondary); }
        .form-group select option { color: #0F172A; }
        .form-group select:focus,
        .form-group input:focus { border-color: var(--primary); }

        .btn {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: #0F172A; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger {
            background: rgba(239,68,68,0.8); color: white;
            font-size: 0.8rem; padding: 6px 12px;
        }
        .btn-danger:hover { background: rgba(239,68,68,1); }

        .table-wrapper { padding: 8px; overflow-x: auto; }
        .users-table { width: 100%; border-collapse: collapse; min-width: 650px; }
        .users-table th {
            text-align: left; padding: 12px 8px; font-size: 0.85rem;
            color: var(--text-secondary); border-bottom: 1px solid var(--glass-border);
            font-weight: 500;
        }
        .users-table td {
            padding: 12px 8px; font-size: 0.95rem; color: var(--text);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .users-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .empty-message { text-align: center; color: var(--text-secondary); padding: 40px; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-admin { background: #00B4D8; color: #0F172A; }
        .badge-general { background: rgba(148,163,184,0.2); color: #94A3B8; }

        .footer {
            text-align: center; padding: 24px; color: var(--text-secondary);
            font-size: 0.8rem; border-top: 1px solid var(--glass-border);
            margin-top: 32px;
        }
        .footer .dev-credit { margin-top: 8px; font-size: 0.75rem; opacity: 0.7; }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1E293B; border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 32px;
            width: 90%; max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: none;
        }
        .modal h3 { margin-bottom: 20px; font-size: 1.2rem; color: var(--text); }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .modal .form-group input:focus { border-color: var(--primary); }
        .modal .btn-group {
            display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: var(--text);
            border: 1px solid var(--glass-border); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }

        .admin-fields { display: none; margin-top: 12px; }
        .admin-fields.visible { display: flex; flex-wrap: wrap; gap: 12px; }

        @media (max-width: 640px) {
            .form-row { flex-direction: column; }
            .admin-fields { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../index.html" class="header-logo">
            <div class="icon">📦</div>
            <h1>東京都立田柄高等学校資産管理</h1>
        </a>
        <div class="header-time" id="headerTime">--</div>
    </header>

    <main class="container">
        <div class="page-header">
            <a href="../index.html" class="back-link">← トップへ</a>
            <h2>👥 ユーザー管理</h2>
        </div>

        <!-- 新規ユーザー追加 -->
        <div class="form-card glass-card">
            <h3>新規ユーザーを追加</h3>
            <div class="form-row" id="userFormRow">
                <div class="form-group" style="max-width: 140px;">
                    <label for="userType">種類</label>
                    <select id="userType">
                        <option value="general">一般</option>
                        <option value="admin">管理者</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="userName">名前</label>
                    <input type="text" id="userName" placeholder="例：田中 太郎">
                </div>
                <div class="form-group">
                    <label for="userRole">役職</label>
                    <select id="userRole">
                        <option value="会長">会長</option>
                        <option value="副会長">副会長</option>
                        <option value="会計">会計</option>
                        <option value="書記">書記</option>
                        <option value="一般">一般</option>
                        <option value="先生">先生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="userMemo">メモ</label>
                    <input type="text" id="userMemo" placeholder="任意">
                </div>
                <button class="btn btn-primary" id="addUserBtn">＋ 追加</button>
            </div>
            <div class="admin-fields" id="adminFields">
                <div class="form-group">
                    <label for="adminEmail">メールアドレス</label>
                    <input type="email" id="adminEmail" placeholder="user@example.com" autocomplete="new-email">
                </div>
                <div class="form-group">
                    <label for="adminPassword">パスワード</label>
                    <input type="password" id="adminPassword" placeholder="6文字以上" autocomplete="new-password">
                </div>
            </div>
        </div>

        <!-- ユーザー一覧 -->
        <div class="glass-card table-wrapper">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>名前</th>
                        <th>種類</th>
                        <th>役職</th>
                        <th>メモ</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
            <div class="empty-message" id="emptyMessage" style="display: none;">
                ユーザーが登録されていません。
            </div>
        </div>
    </main>

    <footer class="footer">
        <div>© 2026 生徒会資産管理システム — 次世代へ引き継ぐために。</div>
        <div class="dev-credit">開発者：包 宸華　テスト：李 昊宇</div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <!-- 認証モーダル -->
    <div class="modal-overlay" id="loginModalOverlay">
        <div class="modal">
            <h3>🔐 認証が必要です</h3>
            <div class="form-group">
                <label for="loginEmail">メールアドレス</label>
                <input type="email" id="loginEmail" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">パスワード</label>
                <input type="password" id="loginPassword" placeholder="パスワード">
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="cancelLoginBtn">キャンセル</button>
                <button class="btn btn-primary" id="confirmLoginBtn">ログイン</button>
            </div>
        </div>
    </div>

    <script type="module" src="../common.js"></script>
    <script type="module" src="users.js"></script>
</body>
</html>

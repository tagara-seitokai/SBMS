<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お知らせ - 東京都立田柄高等学校資産管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .form-card { padding: 24px; margin-bottom: 24px; }
        .form-card h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .form-row {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
        }
        .form-group {
            display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px;
        }
        .form-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .form-group input,
        .form-group textarea {
            padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: var(--text);
            font-size: 0.95rem; outline: none;
            transition: border-color 0.2s;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: var(--primary); }
        .btn {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: #0F172A; }
        .btn-primary:hover { background: var(--primary-hover); }

        .notif-list { margin-top: 8px; }
        .notif-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .notif-item h4 { margin: 0 0 6px; color: var(--text); font-size: 1rem; }
        .notif-item p { margin: 0; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.4; }
        .notif-item .time { font-size: 0.8rem; color: var(--text-secondary); margin-top: 8px; }
        .empty-message { text-align: center; color: var(--text-secondary); padding: 40px; }

        .footer {
            text-align: center; padding: 24px; color: var(--text-secondary);
            font-size: 0.8rem; border-top: 1px solid var(--glass-border);
            margin-top: 32px;
        }
        .footer .dev-credit { margin-top: 8px; font-size: 0.75rem; opacity: 0.7; }

        /* 認証モーダル */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1E293B; border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 32px;
            width: 90%; max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: none;
        }
        .modal h3 { margin-bottom: 20px; font-size: 1.2rem; color: var(--text); }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .modal .btn-group {
            display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: var(--text);
            border: 1px solid var(--glass-border); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../index.html" class="header-logo">
            <div class="icon">📦</div>
            <h1>東京都立田柄高等学校資産管理</h1>
        </a>
        <div class="header-time" id="headerTime">--</div>
    </header>

    <main class="container">
        <div class="page-header">
            <a href="../index.html" class="back-link">← トップへ</a>
            <h2>📢 お知らせ</h2>
        </div>

        <!-- 新規作成ボタン -->
        <button class="btn btn-primary" id="createNotifBtn" style="margin-bottom: 24px;">＋ 新規お知らせ</button>

        <!-- 通知リスト -->
        <div class="notif-list" id="notifList">
            <div class="empty-message">お知らせはありません。</div>
        </div>
    </main>

    <footer class="footer">
        <div>© 2026 生徒会資産管理システム — 次世代へ引き継ぐために。</div>
        <div class="dev-credit">開発者：包 宸華　テスト：李 昊宇</div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <!-- 認証モーダル -->
    <div class="modal-overlay" id="loginModalOverlay">
        <div class="modal">
            <h3>🔐 認証が必要です</h3>
            <div class="form-group">
                <label for="loginEmail">メールアドレス</label>
                <input type="email" id="loginEmail" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">パスワード</label>
                <input type="password" id="loginPassword" placeholder="パスワード">
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="cancelLoginBtn">キャンセル</button>
                <button class="btn btn-primary" id="confirmLoginBtn">ログイン</button>
            </div>
        </div>
    </div>

    <!-- お知らせ作成モーダル -->
    <div class="modal-overlay" id="createModalOverlay">
        <div class="modal">
            <h3>📢 新規お知らせ作成</h3>
            <div class="form-group">
                <label for="notifTitle">タイトル</label>
                <input type="text" id="notifTitleInput" placeholder="例：文化祭の備品利用について">
            </div>
            <div class="form-group">
                <label for="notifContent">内容</label>
                <textarea id="notifContent" rows="4" placeholder="お知らせ内容を入力"></textarea>
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="cancelCreateBtn">キャンセル</button>
                <button class="btn btn-primary" id="confirmCreateBtn">作成</button>
            </div>
        </div>
    </div>

    <script type="module" src="../common.js"></script>
    <script type="module" src="oshirase.js"></script>
</body>
</html>

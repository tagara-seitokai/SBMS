<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>備品管理 - 東京都立田柄高等学校資産管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .form-card { padding: 24px; margin-bottom: 24px; }
        .form-card h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .form-row {
            display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
        }
        .form-group {
            display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px;
        }
        .form-group label { font-size: 0.85rem; color: var(--text-secondary); }
        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input { color: var(--text); }
        .form-group select {
            color: #0F172A;
            background-image: url("data:image/svg+xml;utf8,<svg fill='white' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 8px center;
            padding-right: 30px;
        }
        .form-group select:valid { color: var(--text); }
        .form-group select:invalid { color: var(--text-secondary); }
        .form-group select option { color: #0F172A; }
        .form-group input:focus,
        .form-group select:focus { border-color: var(--primary); }

        .btn {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-primary { background: var(--primary); color: #0F172A; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger {
            background: rgba(239,68,68,0.8); color: white;
            font-size: 0.8rem; padding: 6px 12px;
        }
        .btn-danger:hover { background: rgba(239,68,68,1); }
        .btn-success {
            background: #22C55E; color: #0F172A;
            font-size: 0.8rem; padding: 6px 12px;
        }
        .btn-success:hover { background: #16A34A; }

        .table-wrapper { padding: 8px; margin-bottom: 24px; overflow-x: auto; }
        .items-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .items-table th {
            text-align: left; padding: 12px 8px; font-size: 0.85rem;
            color: var(--text-secondary); border-bottom: 1px solid var(--glass-border);
            font-weight: 500; white-space: nowrap;
        }
        .items-table td {
            padding: 12px 8px; font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
        }
        .items-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .empty-message { text-align: center; color: var(--text-secondary); padding: 40px; }

        .footer {
            text-align: center; padding: 24px; color: var(--text-secondary);
            font-size: 0.8rem; border-top: 1px solid var(--glass-border);
        }
        .footer .dev-credit { margin-top: 8px; font-size: 0.75rem; opacity: 0.7; }

        /* 補充モーダル */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1E293B; border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 24px;
            width: 90%; max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .modal h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            font-size: 0.85rem; color: var(--text-secondary);
            display: block; margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group select {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .modal .btn-group {
            display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: var(--text);
            border: 1px solid var(--glass-border); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../index.html" class="header-logo">
            <div class="icon">📦</div>
            <h1>東京都立田柄高等学校資産管理</h1>
        </a>
        <div class="header-time" id="headerTime">--</div>
    </header>

    <main class="container">
        <div class="page-header">
            <a href="../index.html" class="back-link">← トップへ</a>
            <h2>📦 備品管理</h2>
        </div>

        <!-- 新規備品追加フォーム -->
        <div class="form-card glass-card">
            <h3>新規備品を追加</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="itemName">物品名</label>
                    <input type="text" id="itemName" placeholder="例：プロジェクター">
                </div>
                <div class="form-group" style="max-width: 140px;">
                    <label for="itemLocation">ロケーション番号</label>
                    <input type="text" id="itemLocation" placeholder="例：A-103">
                </div>
                <div class="form-group" style="max-width: 130px;">
                    <label for="recordType">記録方式</label>
                    <select id="recordType">
                        <option value="quantity">数量</option>
                        <option value="status">状態</option>
                    </select>
                </div>
                <div class="form-group" id="quantityGroup" style="max-width: 90px;">
                    <label for="itemQuantity">数量</label>
                    <input type="number" id="itemQuantity" min="0" value="1">
                </div>
                <div class="form-group" id="statusGroup" style="max-width: 130px; display:none;">
                    <label for="itemStatus">状態</label>
                    <select id="itemStatus">
                        <option value="十分">十分</option>
                        <option value="不足">不足</option>
                        <option value="要補充">要補充</option>
                    </select>
                </div>
                <div class="form-group" style="max-width: 130px;">
                    <label for="studentId">出席番号</label>
                    <input type="text" id="studentId" placeholder="例：4635">
                </div>
                <div class="form-group" style="max-width: 90px;">
                    <label for="itemConsumable">消耗品</label>
                    <select id="itemConsumable">
                        <option value="no">×</option>
                        <option value="yes">○</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="itemNotes">備考</label>
                    <input type="text" id="itemNotes" placeholder="任意">
                </div>
                <button class="btn btn-primary" id="addBtn">＋ 追加</button>
            </div>
        </div>

        <!-- 備品一覧 -->
        <div class="glass-card table-wrapper">
            <table class="items-table">
                <thead>
                    <tr>
                        <th>物品名</th>
                        <th>ロケーション</th>
                        <th>記録方式</th>
                        <th>値</th>
                        <th>出席番号</th>
                        <th>消耗品</th>
                        <th>備考</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody"></tbody>
            </table>
            <div class="empty-message" id="emptyMessage" style="display: none;">
                まだ備品が登録されていません。
            </div>
        </div>
    </main>

    <footer class="footer">
        <div>© 2026 生徒会資産管理システム — 次世代へ引き継ぐために。</div>
        <div class="dev-credit">開発者：包 宸華　テスト：李 昊宇</div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <!-- 補充モーダル -->
    <div class="modal-overlay" id="refillModalOverlay">
        <div class="modal">
            <h3 id="refillModalTitle">備品の補充</h3>
            <div id="refillQuantitySection">
                <div class="form-group">
                    <label>現在の数量</label>
                    <input type="text" id="currentQtyDisplay" disabled>
                </div>
                <div class="form-group">
                    <label for="addQuantity">追加数量</label>
                    <input type="number" id="addQuantity" min="0" value="0">
                </div>
            </div>
            <div id="refillStatusSection" style="display:none;">
                <div class="form-group">
                    <label>現在の状態</label>
                    <input type="text" id="currentStatusDisplay" disabled>
                </div>
                <div class="form-group">
                    <label for="newStatus">新しい状態</label>
                    <select id="newStatus">
                        <option value="十分">十分</option>
                        <option value="不足">不足</option>
                        <option value="要補充">要補充</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="refillStudentId">出席番号</label>
                <input type="text" id="refillStudentId" placeholder="例：4635">
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="cancelRefillBtn">キャンセル</button>
                <button class="btn btn-primary" id="confirmRefillBtn">補充する</button>
            </div>
        </div>
    </div>

    <script type="module" src="../common.js"></script>
    <script type="module" src="items.js"></script>
</body>
</html>

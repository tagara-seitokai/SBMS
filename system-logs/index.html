<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>操作履歴 - 生徒会資産管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .log-table-wrapper { padding: 8px; overflow-x: auto; }
        .log-table { width: 100%; border-collapse: collapse; min-width: 750px; }
        .log-table th {
            text-align: left; padding: 12px 8px; font-size: 0.85rem;
            color: var(--text-secondary); border-bottom: 1px solid var(--glass-border);
            font-weight: 500; white-space: nowrap;
        }
        .log-table td {
            padding: 12px 8px; font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text);
            vertical-align: top;
        }
        .log-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .empty-message { text-align: center; color: var(--text-secondary); padding: 40px; }

        /* 種類バッジ（モジュール別色分け） */
        .source-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; font-weight: 600; white-space: nowrap;
        }
        .source-items { background: #00B4D8; color: #0F172A; }          /* 備品管理 */
        .source-inspections { background: #F59E0B; color: #0F172A; }   /* 点検 */
        .source-record { background: #22C55E; color: #0F172A; }        /* 入荷（備品管理と同じ色でも可だが区別） */
        .source-users { background: #8B5CF6; color: #F1F5F9; }         /* ユーザー管理 */
        .source-system-logs { background: #EC4899; color: #F1F5F9; }   /* 操作履歴 */
        .source-system { background: #6B7280; color: #F1F5F9; }        /* システム */
        /* 予備：貸出関連 */
        .source-loans { background: #14B8A6; color: #0F172A; }         /* 貸出・返却 */

        /* フィルターエリア */
        .filter-bar {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 20px; flex-wrap: wrap;
        }
        .filter-bar label {
            font-size: 0.9rem; color: var(--text-secondary);
        }
        .filter-bar select {
            padding: 8px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: #0F172A; font-size: 0.9rem; outline: none;
            transition: border-color 0.2s;
        }
        .filter-bar select:focus { border-color: var(--primary); }

        .clear-bar {
            display: flex; justify-content: flex-end; align-items: center; gap: 16px;
            margin-top: 24px; flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px; border-radius: 8px; border: none;
            font-weight: 600; font-size: 0.9rem; cursor: pointer;
            transition: background 0.2s; white-space: nowrap;
        }
        .btn-danger {
            background: rgba(239,68,68,0.8); color: white;
        }
        .btn-danger:hover { background: rgba(239,68,68,1); }

        .footer {
            text-align: center; padding: 24px; color: var(--text-secondary);
            font-size: 0.8rem; border-top: 1px solid var(--glass-border);
            margin-top: 32px;
        }
        .footer .dev-credit { margin-top: 8px; font-size: 0.75rem; opacity: 0.7; }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1E293B; border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 32px;
            width: 90%; max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); backdrop-filter: none;
        }
        .modal h3 { margin-bottom: 20px; font-size: 1.2rem; color: var(--text); }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            font-size: 0.85rem; color: var(--text-secondary); display: block; margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%; padding: 10px 12px; border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05); color: var(--text);
            font-size: 0.95rem; outline: none;
        }
        .modal .btn-group {
            display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1); color: var(--text);
            border: 1px solid var(--glass-border); padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: #0F172A; }
        .btn-primary:hover { background: var(--primary-hover); }

        @media (max-width: 640px) {
            .clear-bar { flex-direction: column; align-items: stretch; }
            .filter-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="../index.html" class="header-logo">
            <div class="icon">📦</div>
            <h1>生徒会資産管理</h1>
        </a>
        <div class="header-time" id="headerTime">--</div>
    </header>

    <main class="container">
        <div class="page-header">
            <a href="../index.html" class="back-link">← トップへ</a>
            <h2>📓 操作履歴</h2>
        </div>

        <!-- フィルター -->
        <div class="filter-bar">
            <label for="filterSelect">種類で絞り込み：</label>
            <select id="filterSelect">
                <option value="">すべて表示</option>
            </select>
        </div>

        <div class="glass-card log-table-wrapper">
            <table class="log-table">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>種類</th>
                        <th>操作者</th>
                        <th>内容</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
            <div class="empty-message" id="emptyMessage" style="display: none;">
                操作ログはまだありません。
            </div>
        </div>

    </main>

    <footer class="footer">
        <div>© 2026 生徒会資産管理システム — 次世代へ引き継ぐために。</div>
        <div class="dev-credit">開発者：包 宸華　テスト：李 昊宇</div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="loginModalOverlay">
        <div class="modal">
            <h3>🔐 認証が必要です</h3>
            <div class="form-group">
                <label for="loginEmail">メールアドレス</label>
                <input type="email" id="loginEmail" placeholder="user@example.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">パスワード</label>
                <input type="password" id="loginPassword" placeholder="パスワード">
            </div>
            <div class="btn-group">
                <button class="btn-secondary" id="cancelLoginBtn">キャンセル</button>
                <button class="btn btn-primary" id="confirmLoginBtn">ログイン</button>
            </div>
        </div>
    </div>

    <script type="module" src="../common.js"></script>
    <script type="module" src="system-logs.js"></script>
</body>
</html>
